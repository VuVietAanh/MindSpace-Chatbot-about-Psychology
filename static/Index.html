<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindSpace</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0e11;--surface:#1a1820;--surface2:#221f2a;--surface3:#2a2640;
  --border:#2e2a38;--border2:rgba(255,255,255,.1);
  --accent:#b89aff;--accent2:#7dd8c8;
  --text:#e8e2f5;--text-muted:#8a8398;
  --danger:#ff6b8a;--sidebar-w:262px;
}
#setup-bg-layer,#chat-bg-layer{position:fixed;inset:0;z-index:-2;background-size:cover;background-position:center;opacity:0;transition:opacity 1.2s ease}
#bg-overlay{position:fixed;inset:0;z-index:-1;background:linear-gradient(135deg,rgba(15,14,17,.9) 0%,rgba(15,14,17,.8) 50%,rgba(15,14,17,.93) 100%);pointer-events:none}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;height:100vh;display:flex;overflow:hidden}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:300;align-items:center;justify-content:center;background:rgba(15,14,17,.7);backdrop-filter:blur(10px)}
.modal-overlay.visible{display:flex;animation:fadeIn .25s ease}
.modal-card{max-width:460px;width:92%;background:rgba(26,24,32,.97);border:1px solid var(--border);border-radius:20px;padding:34px 30px;box-shadow:0 24px 60px rgba(0,0,0,.6);animation:slideUp .3s ease}
.modal-icon{font-size:1.8rem;margin-bottom:12px}
.modal-card h2{font-family:'DM Serif Display',serif;font-size:1.4rem;margin-bottom:6px}
.modal-card .sub{font-size:.8rem;color:var(--text-muted);margin-bottom:22px}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.btn-primary{flex:1;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;padding:12px;color:#0f0e11;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;transition:opacity .2s}
.btn-primary:hover{opacity:.85}
.btn-secondary{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:.88rem;cursor:pointer;transition:all .15s}
.btn-secondary:hover{border-color:var(--text-muted);color:var(--text)}

/* ── AUTH ── */
#auth-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:200}
.auth-card{width:420px;max-width:calc(100vw - 40px);background:rgba(26,24,32,.92);border:1px solid var(--border);border-radius:24px;padding:42px 38px;backdrop-filter:blur(24px);box-shadow:0 32px 80px rgba(0,0,0,.55)}
.auth-logo{font-family:'DM Serif Display',serif;font-size:2.1rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px}
.auth-sub{font-size:.8rem;color:var(--text-muted);margin-bottom:26px}
.auth-tabs{display:flex;gap:0;margin-bottom:22px;background:var(--surface2);border-radius:10px;padding:3px}
.auth-tab{flex:1;padding:8px;border:none;background:none;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;border-radius:8px;transition:all .15s}
.auth-tab.active{background:var(--surface3);color:var(--text)}
.field{margin-bottom:13px}
.field label{display:block;font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.field input,.field select{width:100%;background:rgba(34,31,42,.7);border:1px solid var(--border);border-radius:10px;padding:10px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.86rem;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:var(--surface2)}
.fields-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.auth-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;padding:13px;color:#0f0e11;font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:500;cursor:pointer;margin-top:4px;transition:opacity .2s}
.auth-btn:hover{opacity:.87}
.auth-err{font-size:.73rem;color:var(--danger);margin-top:8px;display:none;font-family:'DM Mono',monospace}
.auth-form{display:none}
.auth-form.active{display:block}
.guest-link{text-align:center;margin-top:14px;font-size:.76rem;color:var(--text-muted)}
.guest-link a{color:var(--accent);cursor:pointer}

/* ── SIDEBAR ── */
#sidebar{width:var(--sidebar-w);background:rgba(20,18,26,.88);backdrop-filter:blur(20px);border-right:1px solid var(--border);display:none;flex-direction:column;flex-shrink:0;height:100vh;z-index:10}
.sidebar-header{padding:18px 12px 12px;border-bottom:1px solid var(--border)}
.sidebar-logo{font-family:'DM Serif Display',serif;font-size:1.1rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.btn-new-chat{width:100%;background:rgba(34,31,42,.7);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.81rem;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;transition:all .2s}
.btn-new-chat:hover{border-color:var(--accent);background:rgba(42,36,64,.6)}
.btn-new-chat .plus{color:var(--accent);font-size:1.05rem;line-height:1}
.sidebar-label{font-size:.66rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.09em;padding:12px 12px 4px}
#conv-list{flex:1;overflow-y:auto;padding:0 6px 10px}
#conv-list::-webkit-scrollbar{width:3px}
#conv-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ── CONV ITEM ── */
.conv-item{padding:8px 10px;border-radius:9px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;position:relative;transition:background .15s}
.conv-item:hover{background:rgba(34,31,42,.7)}
.conv-item.active{background:rgba(42,36,64,.7);border-color:rgba(184,154,255,.2)}
.conv-item-title{font-size:.81rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;padding-right:26px}
.conv-item.active .conv-item-title{color:var(--accent)}
.conv-item-date{font-size:.67rem;color:var(--text-muted)}

/* Gear button */
.conv-gear-btn{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.78rem;padding:4px 5px;border-radius:5px;opacity:0;transition:opacity .15s,color .15s;line-height:1}
.conv-item:hover .conv-gear-btn{opacity:1}
.conv-gear-btn:hover{color:var(--accent)}

/* Context menu */
.conv-menu{position:absolute;right:6px;top:calc(100% - 4px);z-index:100;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:4px;min-width:130px;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:fadeIn .15s ease}
.conv-menu-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:.8rem;color:var(--text-muted);transition:all .12s}
.conv-menu-item:hover{background:var(--surface3);color:var(--text)}
.conv-menu-item.danger:hover{background:rgba(255,107,138,.08);color:var(--danger)}

.conv-empty{padding:12px 10px;font-size:.77rem;color:var(--text-muted);font-style:italic}
.sidebar-user{padding:10px 12px 14px;border-top:1px solid var(--border);flex-shrink:0}
.user-info{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:.76rem;color:#0f0e11;font-weight:500;flex-shrink:0}
.user-name{font-size:.8rem;font-weight:500;color:var(--text)}
.user-email{font-size:.67rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.sidebar-actions{display:flex;gap:5px}
.btn-sidebar-action{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px;color:var(--text-muted);font-size:.7rem;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.btn-sidebar-action:hover{border-color:var(--accent);color:var(--accent)}
.btn-sidebar-action.danger:hover{border-color:var(--danger);color:var(--danger)}

/* ── RENAME INLINE ── */
.rename-input{width:calc(100% - 34px);background:rgba(34,31,42,.9);border:1px solid var(--accent);border-radius:6px;padding:4px 8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.8rem;outline:none}

/* ── CHAT ── */
#chat-screen{flex:1;display:none;flex-direction:column;height:100vh;overflow:hidden;z-index:1}
header{display:flex;align-items:center;justify-content:space-between;padding:13px 22px;border-bottom:1px solid var(--border);background:rgba(15,14,17,.75);backdrop-filter:blur(16px);flex-shrink:0}
.header-left{display:flex;align-items:center;gap:9px}
.logo{font-family:'DM Serif Display',serif;font-size:1.1rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);animation:pulse 2s infinite}
#conv-title{font-size:.8rem;color:var(--text-muted);max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-right{display:flex;align-items:center;gap:7px}
.emotion-badge{font-size:.71rem;color:var(--text-muted);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px 10px;display:none}
.btn-icon{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:6px 11px;color:var(--text-muted);font-size:.74rem;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}
.btn-icon.danger:hover{border-color:var(--danger);color:var(--danger)}
#messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:13px;scroll-behavior:smooth}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.message{display:flex;gap:9px;animation:slideUp .25s ease;max-width:700px}
.message.user{flex-direction:row-reverse;align-self:flex-end}
.message.bot{align-self:flex-start}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.bot .avatar{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0f0e11;font-weight:500}
.user .avatar{background:var(--surface2);color:var(--text-muted)}
.bubble{padding:11px 15px;border-radius:15px;line-height:1.65;font-size:.9rem;max-width:520px}
.bot .bubble{background:rgba(30,29,38,.9);border:1px solid var(--border);border-top-left-radius:4px;color:var(--text)}
.user .bubble{background:rgba(42,36,64,.92);border-top-right-radius:4px;color:var(--text)}
.typing-indicator{display:flex;gap:5px;align-items:center;padding:11px 15px}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:typing 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
.chat-divider{text-align:center;color:var(--text-muted);font-size:.68rem;padding:4px 0;opacity:.5}
#emotion-panel{display:none;background:rgba(26,24,32,.9);backdrop-filter:blur(16px);border-top:1px solid var(--border);padding:16px 20px;flex-shrink:0}
.emotion-panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.emotion-panel-header h3{font-family:'DM Serif Display',serif;font-size:.92rem;color:var(--text-muted);font-weight:400}
.btn-close-panel{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.95rem}
.emotion-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.emotion-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.emotion-name{font-size:.66rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.emotion-bar-wrap{background:var(--bg);border-radius:4px;height:4px;overflow:hidden;margin-bottom:4px}
.emotion-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s ease}
.emotion-score{font-size:.73rem;color:var(--text)}
#input-area{padding:13px 20px 17px;border-top:1px solid var(--border);background:rgba(15,14,17,.75);backdrop-filter:blur(16px);flex-shrink:0}
.input-wrap{display:flex;gap:9px;align-items:flex-end;background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:10px 13px;transition:border-color .2s}
.input-wrap:focus-within{border-color:var(--accent)}
#user-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;resize:none;line-height:1.5;max-height:120px;overflow-y:auto}
#user-input::placeholder{color:var(--text-muted)}
.send-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity .2s,transform .1s}
.send-btn:hover{opacity:.85}
.send-btn:active{transform:scale(.93)}
.send-btn:disabled{opacity:.3;cursor:not-allowed}
.send-btn svg{width:15px;height:15px;fill:#0f0e11}
.input-hint{font-size:.68rem;color:var(--text-muted);text-align:center;margin-top:6px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes typing{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-4px);opacity:1}}
</style>
</head>
<body>
<div id="setup-bg-layer"></div>
<div id="chat-bg-layer"></div>
<div id="bg-overlay"></div>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">MindSpace</div>
    <div class="auth-sub">A safe space to share, reflect, and be heard.</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign in</button>
      <button class="auth-tab" onclick="switchTab('register')">Create account</button>
    </div>
    <div class="auth-form active" id="form-login">
      <div class="field"><label>Email</label><input type="email" id="l-email" placeholder="you@example.com" autocomplete="off"/></div>
      <div class="field"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••"/></div>
      <button class="auth-btn" onclick="doLogin()">Sign in →</button>
      <div class="auth-err" id="l-err"></div>
    </div>
    <div class="auth-form" id="form-register">
      <div class="field"><label>Name</label><input type="text" id="r-name" placeholder="Your name" autocomplete="off"/></div>
      <div class="field"><label>Email</label><input type="email" id="r-email" placeholder="you@example.com" autocomplete="off"/></div>
      <div class="field"><label>Password</label><input type="password" id="r-pass" placeholder="Min 8 characters"/></div>
      <div class="fields-row">
        <div class="field"><label>Age</label><input type="number" id="r-age" placeholder="—" min="13" max="120"/></div>
        <div class="field"><label>Gender</label>
          <select id="r-gender"><option value="">Prefer not to say</option><option value="male">Male</option><option value="female">Female</option><option value="other">Other</option></select>
        </div>
      </div>
      <div class="field"><label>Date of Birth</label><input type="date" id="r-dob"/></div>
      <button class="auth-btn" onclick="doRegister()">Create account →</button>
      <div class="auth-err" id="r-err"></div>
    </div>
    <div class="guest-link">or <a onclick="startGuest()">continue as guest</a></div>
  </div>
</div>

<!-- Identity Modal -->
<div id="identity-modal" class="modal-overlay">
  <div class="modal-card">
    <div class="modal-icon">🤔</div>
    <p id="identity-question-text"></p>
    <div class="modal-actions">
      <button class="btn-primary" onclick="confirmIdentity(true)">Yes, that's me</button>
      <button class="btn-secondary" onclick="confirmIdentity(false)">No, I'm someone else</button>
    </div>
  </div>
</div>

<!-- Returning Modal -->
<div id="returning-modal" class="modal-overlay">
  <div class="modal-card">
    <div class="modal-icon">💭</div>
    <p id="returning-text"></p>
    <div class="modal-actions">
      <button class="btn-primary" onclick="dismissReturning(true)">Yes, continue thread</button>
      <button class="btn-secondary" onclick="dismissReturning(false)">Start fresh</button>
    </div>
  </div>
</div>

<!-- Profile Modal -->
<div id="profile-modal" class="modal-overlay">
  <div class="modal-card">
    <div class="modal-icon">👤</div>
    <h2>Your Profile</h2>
    <div class="sub" id="profile-email-display"></div>
    <div class="field"><label>Name</label><input type="text" id="p-name"/></div>
    <div class="fields-row">
      <div class="field"><label>Age</label><input type="number" id="p-age" min="13" max="120"/></div>
      <div class="field"><label>Gender</label>
        <select id="p-gender"><option value="">Prefer not to say</option><option value="male">Male</option><option value="female">Female</option><option value="other">Other</option></select>
      </div>
    </div>
    <div class="field"><label>Date of Birth</label><input type="date" id="p-dob"/></div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveProfile()">Save changes</button>
      <button class="btn-secondary" onclick="closeModal('profile-modal')">Cancel</button>
    </div>
  </div>
</div>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">MindSpace</div>
    <button class="btn-new-chat" onclick="newConversation()">
      <span class="plus">+</span> New conversation
    </button>
  </div>
  <div class="sidebar-label">Conversations</div>
  <div id="conv-list"></div>
  <div class="sidebar-user">
    <div class="user-info">
      <div class="user-avatar" id="user-avatar-initial">?</div>
      <div style="min-width:0">
        <div class="user-name" id="sidebar-user-name">Guest</div>
        <div class="user-email" id="sidebar-user-email"></div>
      </div>
    </div>
    <div class="sidebar-actions">
      <button class="btn-sidebar-action" onclick="openProfile()">Profile</button>
      <button class="btn-sidebar-action danger" onclick="doLogout()">Sign out</button>
    </div>
  </div>
</div>

<!-- Chat -->
<div id="chat-screen">
  <header>
    <div class="header-left">
      <div class="logo">MindSpace</div>
      <div class="status-dot"></div>
      <span id="conv-title"></span>
    </div>
    <div class="header-right">
      <span class="emotion-badge" id="emotion-badge"></span>
      <button class="btn-icon" onclick="toggleEmotionPanel()">📊 Emotions</button>
      <button class="btn-icon danger" onclick="endSession()">End session</button>
    </div>
  </header>
  <div id="messages"></div>
  <div id="emotion-panel">
    <div class="emotion-panel-header">
      <h3>Emotion state — this conversation</h3>
      <button class="btn-close-panel" onclick="toggleEmotionPanel()">✕</button>
    </div>
    <div class="emotion-grid" id="emotion-grid"></div>
  </div>
  <div id="input-area">
    <div class="input-wrap">
      <textarea id="user-input" placeholder="Share what's on your mind..." rows="1"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
    <p class="input-hint">Enter to send · Shift+Enter for new line</p>
  </div>
</div>

<script>
const API = '';
let userId = null, conversationId = null, activeConvId = null;
let emotionPanelOpen = false, pendingPrevConvId = null;
let currentUser = null;
let authToken   = localStorage.getItem('ms_token');
let openMenuId  = null;  // Track which conv menu is open

const textarea = document.getElementById('user-input');

// ── Close menu on outside click ──
document.addEventListener('click', e => {
  if (openMenuId && !e.target.closest('.conv-gear-btn') && !e.target.closest('.conv-menu')) {
    closeAllMenus();
  }
});

function closeAllMenus() {
  document.querySelectorAll('.conv-menu').forEach(m => m.remove());
  openMenuId = null;
}

// ── Backgrounds ──
async function loadBg(type) {
  try {
    const endpoint = type === 'chat' ? '/api/chat-backgrounds' : '/api/backgrounds';
    const data = await (await fetch(endpoint)).json();
    const layer = document.getElementById(type === 'chat' ? 'chat-bg-layer' : 'setup-bg-layer');
    if (data.images?.length > 0) {
      const pick   = data.images[Math.floor(Math.random() * data.images.length)];
      const prefix = type === 'chat' ? '/static/chat_backgrounds/' : '/static/backgrounds/';
      const img    = new Image();
      img.onload   = () => { layer.style.backgroundImage = `url('${prefix + pick}')`; layer.style.opacity = '1'; };
      img.src      = prefix + pick;
    }
  } catch (_) {}
}
loadBg('setup');

// ── Auth tabs ──
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('form-login').classList.toggle('active', tab === 'login');
  document.getElementById('form-register').classList.toggle('active', tab === 'register');
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  document.getElementById('l-err').style.display = 'none';

  // Validate email format
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showErr('l-err', 'Invalid email format'); return;
  }
  if (!pass) { showErr('l-err', 'Password required'); return; }

  try {
    const res  = await fetch(API + '/api/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pass}),
    });
    const data = await res.json();
    if (!res.ok) { showErr('l-err', data.detail || 'Login failed'); return; }

    authToken = data.token;
    currentUser = data;
    localStorage.setItem('ms_token', authToken);
    // ← Lưu user_id từ token vào localStorage
    localStorage.setItem('ms_uid', data.user_id);

    // Admin → redirect sang /admin
    if (data.role === 'admin') {
      localStorage.setItem('ms_admin_token', authToken);    
      window.location.href = '/admin';
      return;
    }
    afterAuth();
  } catch { showErr('l-err', 'Connection error'); }
}

async function doRegister() {
  const name   = document.getElementById('r-name').value.trim();
  const email  = document.getElementById('r-email').value.trim();
  const pass   = document.getElementById('r-pass').value;
  const age    = parseInt(document.getElementById('r-age').value) || null;
  const gender = document.getElementById('r-gender').value || null;
  const dob    = document.getElementById('r-dob').value || null;
  document.getElementById('r-err').style.display = 'none';

  // Validate
  if (!name)  { showErr('r-err', 'Name required'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showErr('r-err', 'Invalid email format'); return;
  }
  if (pass.length < 8) {
    showErr('r-err', 'Password must be at least 8 characters'); return;
  }
  if (!/[A-Z]/.test(pass)) {
    showErr('r-err', 'Password must contain at least 1 uppercase letter'); return;
  }
  if (!/[0-9]/.test(pass)) {
    showErr('r-err', 'Password must contain at least 1 number'); return;
  }

  try {
    const res  = await fetch(API + '/api/auth/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, email, password: pass, age, gender, date_of_birth: dob}),
    });
    const data = await res.json();
    if (!res.ok) { showErr('r-err', data.detail || 'Registration failed'); return; }

    authToken = data.token;
    currentUser = data;
    localStorage.setItem('ms_token', authToken);
    localStorage.setItem('ms_uid', data.user_id);
    afterAuth();
  } catch { showErr('r-err', 'Connection error'); }
}

async function startGuest() {
  currentUser = {user_id: null, name: null, role: 'guest'};
  authToken   = null;
  afterAuth();
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
}

function doLogout() {
  localStorage.removeItem('ms_token');
  localStorage.removeItem('ms_uid');
  location.reload();
}

// ── Auto-login ──
if (authToken) {
  fetch(API + '/api/auth/me', {headers: {'Authorization': 'Bearer ' + authToken}})
    .then(r => r.json())
    .then(d => {
      if (d.role === 'admin') {
        window.location.href = '/admin';
        return;
      }
      currentUser = d;
      // Sync user_id từ server về localStorage
      localStorage.setItem('ms_uid', d.user_id);
      afterAuth();
    })
    .catch(() => localStorage.removeItem('ms_token'));
}

// ── After auth ──
async function afterAuth() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('sidebar').style.display     = 'flex';
  document.getElementById('chat-screen').style.display = 'flex';
  document.getElementById('setup-bg-layer').style.opacity = '0';
  loadBg('chat');

  if (currentUser?.name) {
    document.getElementById('sidebar-user-name').textContent = currentUser.name;
    document.getElementById('user-avatar-initial').textContent = currentUser.name.charAt(0).toUpperCase();
  }
  if (currentUser?.email) {
    document.getElementById('sidebar-user-email').textContent = currentUser.email;
  }

  // Dùng user_id từ token thay vì localStorage riêng
  userId = currentUser.user_id;
  localStorage.setItem('ms_uid', userId);  // ← sync lại

  const res  = await fetch(API + '/api/start', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      name: currentUser?.name || null,
      user_id: userId,  // ← dùng user_id từ JWT
    }),
  });
  const data = await res.json();

  conversationId = data.conversation_id;
  activeConvId   = conversationId;

  if (data.identity_check) {
    document.getElementById('identity-question-text').innerHTML =
      (data.identity_question || '').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    document.getElementById('identity-modal').classList.add('visible');
  } else {
    if (data.greeting) addMessage('bot', data.greeting);
    if (data.returning_prompt) {
      pendingPrevConvId = data.prev_conversation_id;
      setTimeout(() => showReturningPrompt(data.returning_prompt), 900);
    }
  }

  await loadConvList();
  textarea.focus();
}

// ── Profile ──
async function openProfile() {
  if (!authToken) return;
  const data = await (await fetch(API + '/api/auth/me', {headers: {'Authorization':'Bearer ' + authToken}})).json();
  document.getElementById('profile-email-display').textContent = data.email || '';
  document.getElementById('p-name').value   = data.name || '';
  document.getElementById('p-age').value    = data.age || '';
  document.getElementById('p-gender').value = data.gender || '';
  document.getElementById('p-dob').value    = data.date_of_birth || '';
  document.getElementById('profile-modal').classList.add('visible');
}

async function saveProfile() {
  const body = {
    name:          document.getElementById('p-name').value.trim() || null,
    age:           parseInt(document.getElementById('p-age').value) || null,
    gender:        document.getElementById('p-gender').value || null,
    date_of_birth: document.getElementById('p-dob').value || null,
  };
  await fetch(API + '/api/auth/profile', {
    method: 'PUT',
    headers: {'Content-Type':'application/json','Authorization':'Bearer ' + authToken},
    body: JSON.stringify(body),
  });
  if (body.name) {
    document.getElementById('sidebar-user-name').textContent = body.name;
    document.getElementById('user-avatar-initial').textContent = body.name.charAt(0).toUpperCase();
  }
  closeModal('profile-modal');
}

function closeModal(id) { document.getElementById(id).classList.remove('visible'); }

// ── Identity ──
async function confirmIdentity(isSame) {
  closeModal('identity-modal');
  const res  = await fetch(API + '/api/confirm-identity', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({user_id: userId, conversation_id: conversationId,
      is_same_person: isSame, new_name: currentUser?.name}),
  });
  const data = await res.json();
  if (data.is_new_user) { userId = data.user_id; localStorage.setItem('ms_uid', userId); }
  conversationId = data.conversation_id; activeConvId = conversationId;
  addMessage('bot', data.greeting);
  await loadConvList();
}

// ── Returning ──
function showReturningPrompt(text) {
  document.getElementById('returning-text').innerHTML =
    text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  document.getElementById('returning-modal').classList.add('visible');
}

async function dismissReturning(continueThread) {
  closeModal('returning-modal');
  if (continueThread && pendingPrevConvId) {
    await fetch(API + '/api/conversation/carry-over', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({user_id: userId, source_conversation_id: pendingPrevConvId}),
    });
    const msgs = await (await fetch(API + `/api/conversation/${pendingPrevConvId}/messages`)).json();
    if (msgs.length > 0) {
      addDivider('— Previous conversation —');
      msgs.forEach(m => addMessage(m.role, m.content, false));
      addDivider('— Continuing now —');
    }
    addMessage('bot', "I'm glad you came back. How are you feeling right now?");
    if (emotionPanelOpen) loadEmotionPanel();
  } else {
    addMessage('bot', "Of course, let's start fresh. What's on your mind?");
  }
  pendingPrevConvId = null;
}

// ── Conversations ──
async function newConversation() {
  if (!userId) return;
  // Lưu conversationId cũ vào list trước khi tạo mới
  clearMessages();
  setInputEnabled(true);
  document.getElementById('conv-title').textContent = '';

  const res  = await fetch(API + '/api/conversation/new', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({user_id: userId}),
  });
  const data = await res.json();

  conversationId = data.conversation_id;
  activeConvId   = conversationId;

  if (data.greeting) addMessage('bot', data.greeting);
  if (data.returning_prompt) {
    pendingPrevConvId = data.prev_conversation_id;
    setTimeout(() => showReturningPrompt(data.returning_prompt), 900);
  }

  // Reload list sau khi tạo conv mới — conv cũ vẫn còn trong DB
  await loadConvList();
  textarea.focus();
}

async function loadConversation(convId, title) {
  if (convId === activeConvId) return;
  closeAllMenus();
  activeConvId   = convId;
  conversationId = convId;
  clearMessages();

  const msgs = await (await fetch(API + `/api/conversation/${convId}/messages`)).json();
  if (msgs.length === 0) addMessage('bot', 'This conversation is empty.');
  else msgs.forEach(m => addMessage(m.role, m.content, false));

  document.getElementById('conv-title').textContent = title || '';
  document.getElementById('messages').scrollTop = 999999;
  setInputEnabled(true);
  if (emotionPanelOpen) loadEmotionPanel();
  await loadConvList();
}

// ── Conv List — hiển thị TẤT CẢ conversations của user ──
async function loadConvList() {
  if (!userId) return;
  try {
    const convs = await (await fetch(API + `/api/conversations/${userId}`)).json();
    const list  = document.getElementById('conv-list');
    list.innerHTML = '';

    if (!Array.isArray(convs) || convs.length === 0) {
      list.innerHTML = '<div class="conv-empty">No conversations yet</div>';
      return;
    }

    convs.forEach(conv => {
      const item  = document.createElement('div');
      item.className = `conv-item ${conv.conversation_id === activeConvId ? 'active' : ''}`;
      item.id     = `conv-item-${conv.conversation_id}`;

      const title = conv.name_conversation || 'New conversation';
      item.innerHTML = `
        <div class="conv-item-title">${escHtml(title)}</div>
        <div class="conv-item-date">${conv.started_at || ''}</div>
        <button class="conv-gear-btn" title="Options">⚙</button>
      `;

      // Click item → load conversation
      item.onclick = e => {
        if (e.target.closest('.conv-gear-btn') || e.target.closest('.conv-menu')) return;
        loadConversation(conv.conversation_id, title);
      };

      // Gear button → show context menu
      const gearBtn = item.querySelector('.conv-gear-btn');
      gearBtn.onclick = e => {
        e.stopPropagation();
        toggleConvMenu(conv.conversation_id, conv.name_conversation, item, gearBtn);
      };

      list.appendChild(item);
    });
  } catch (err) {
    console.error('loadConvList error:', err);
  }
}

// ── Context menu (Rename + Delete) ──
function toggleConvMenu(convId, currentName, itemEl, gearBtn) {
  // Close existing menu
  if (openMenuId === convId) { closeAllMenus(); return; }
  closeAllMenus();
  openMenuId = convId;

  const menu = document.createElement('div');
  menu.className = 'conv-menu';
  menu.innerHTML = `
    <div class="conv-menu-item" id="menu-rename-${convId}">
      ✏️ Rename
    </div>
    <div class="conv-menu-item danger" id="menu-delete-${convId}">
      🗑 Delete
    </div>
  `;

  itemEl.style.position = 'relative';
  itemEl.appendChild(menu);

  document.getElementById(`menu-rename-${convId}`).onclick = e => {
    e.stopPropagation();
    closeAllMenus();
    startRename(convId, currentName, itemEl);
  };

  document.getElementById(`menu-delete-${convId}`).onclick = e => {
    e.stopPropagation();
    closeAllMenus();
    deleteConversation(convId);
  };
}

// ── Rename inline ──
function startRename(convId, currentName, itemEl) {
  const titleEl = itemEl.querySelector('.conv-item-title');
  const oldText = titleEl.textContent;

  // Replace title with input
  titleEl.style.display = 'none';
  const input = document.createElement('input');
  input.className = 'rename-input';
  input.value = oldText === 'New conversation' ? '' : oldText;
  input.placeholder = 'Conversation name...';
  itemEl.insertBefore(input, itemEl.querySelector('.conv-item-date'));
  input.focus();
  input.select();

  const confirm = async () => {
    const newName = input.value.trim();
    input.remove();
    titleEl.style.display = '';
    if (!newName || newName === oldText) return;

    try {
      const res = await fetch(API + `/api/conversation/${convId}/rename`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({name: newName}),
      });
      const data = await res.json();
      titleEl.textContent = data.name || newName;
      if (convId === activeConvId) {
        document.getElementById('conv-title').textContent = data.name || newName;
      }
    } catch {
      titleEl.textContent = oldText;
    }
  };

  const cancel = () => {
    input.remove();
    titleEl.style.display = '';
  };

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); confirm(); }
    if (e.key === 'Escape') cancel();
  });
  input.addEventListener('blur', confirm);
  input.onclick = e => e.stopPropagation();
}

// ── Delete conversation ──
async function deleteConversation(convId) {
  if (!confirm('Delete this conversation? This cannot be undone.')) return;

  await fetch(API + `/api/conversation/${convId}`, {method: 'DELETE'});

  if (convId === activeConvId) {
    clearMessages();
    conversationId = null;
    activeConvId   = null;
    document.getElementById('conv-title').textContent = '';
    addMessage('bot', 'Conversation deleted. Start a new one anytime.');
    setInputEnabled(false);
  }

  await loadConvList();
}

// ── Send message ──
async function sendMessage() {
  const text = textarea.value.trim();
  if (!text || !userId || !conversationId) return;
  textarea.value = ''; textarea.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  addMessage('user', text);
  const tid = addTyping();

  try {
    const res  = await fetch(API + '/api/chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({user_id: userId, conversation_id: conversationId, message: text}),
    });
    const data = await res.json();
    removeTyping(tid);
    addMessage('bot', data.response);
    updateEmotionBadge(data.dominant_emotion);
    if (emotionPanelOpen) loadEmotionPanel();
    // Reload conv list để cập nhật name_conversation sau tin đầu tiên
    await loadConvList();
  } catch {
    removeTyping(tid);
    addMessage('bot', 'Something went wrong. Please try again.');
  }

  document.getElementById('send-btn').disabled = false;
  textarea.focus();
}

// ── UI helpers ──
function addMessage(role, text, animate = true) {
  const c   = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  if (!animate) div.style.animation = 'none';
  const av = document.createElement('div'); av.className = 'avatar'; av.textContent = role === 'bot' ? 'M' : '✦';
  const bb = document.createElement('div'); bb.className = 'bubble'; bb.textContent = text;
  div.appendChild(av); div.appendChild(bb);
  c.appendChild(div); c.scrollTop = c.scrollHeight;
}
function addDivider(text) {
  const c = document.getElementById('messages');
  const d = document.createElement('div'); d.className = 'chat-divider'; d.textContent = text;
  c.appendChild(d);
}
function clearMessages() { document.getElementById('messages').innerHTML = ''; }
function addTyping() {
  const c  = document.getElementById('messages');
  const id = 'ty-' + Date.now();
  const div = document.createElement('div'); div.className = 'message bot'; div.id = id;
  const av  = document.createElement('div'); av.className = 'avatar'; av.textContent = 'M';
  const bb  = document.createElement('div'); bb.className = 'bubble typing-indicator';
  bb.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  div.appendChild(av); div.appendChild(bb);
  c.appendChild(div); c.scrollTop = c.scrollHeight;
  return id;
}
function removeTyping(id) { const el = document.getElementById(id); if (el) el.remove(); }
function setInputEnabled(v) { document.getElementById('input-area').style.display = v ? 'block' : 'none'; }
function updateEmotionBadge(emotion) {
  const EMOJI = {anger:'😠',disgust:'🤢',fear:'😨',joy:'😊',sadness:'😢',surprise:'😮',trust:'🤝',anticipation:'🌟',neutral:'😶'};
  const b = document.getElementById('emotion-badge');
  b.textContent = `${EMOJI[emotion]||'💭'} ${emotion}`; b.style.display = 'block';
}
function escHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

// ── Emotion panel ──
function toggleEmotionPanel() {
  emotionPanelOpen = !emotionPanelOpen;
  document.getElementById('emotion-panel').style.display = emotionPanelOpen ? 'block' : 'none';
  if (emotionPanelOpen) loadEmotionPanel();
}
async function loadEmotionPanel() {
  const target = activeConvId || conversationId;
  if (!target) return;
  try {
    const data = await (await fetch(API + `/api/emotion/conversation/${target}`)).json();
    const EMOTIONS = ['sadness','fear','anger','disgust','joy','trust','surprise','anticipation'];
    const grid = document.getElementById('emotion-grid');
    grid.innerHTML = '';
    EMOTIONS.forEach(e => {
      const pct  = Math.round((data.scores[e] || 0) * 100);
      const item = document.createElement('div'); item.className = 'emotion-item';
      item.innerHTML = `<div class="emotion-name">${e}</div><div class="emotion-bar-wrap"><div class="emotion-bar" style="width:${pct}%"></div></div><div class="emotion-score">${pct}%</div>`;
      grid.appendChild(item);
    });
  } catch (_) {}
}

// ── End session ──
async function endSession() {
  if (!conversationId) return;
  if (!confirm('End this session?')) return;
  await fetch(API + `/api/end/${conversationId}`, {method: 'POST'});
  addMessage('bot', "Take care of yourself. It's okay to reach out anytime. 💙");
  setInputEnabled(false);
  emotionPanelOpen = true;
  document.getElementById('emotion-panel').style.display = 'block';
  await loadEmotionPanel();
  await loadConvList();
}

// ── Input events ──
textarea.addEventListener('input', () => {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
});
textarea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const as = document.getElementById('auth-screen');
  if (as && as.style.display !== 'none') {
    document.getElementById('form-login').classList.contains('active') ? doLogin() : doRegister();
  }
});

// Expose tất cả functions ra global scope
window.switchTab       = switchTab;
window.doLogin         = doLogin;
window.doRegister      = doRegister;
window.startGuest      = startGuest;
window.confirmIdentity = confirmIdentity;
window.dismissReturning = dismissReturning;
window.newConversation = newConversation;
window.sendMessage     = sendMessage;
window.toggleEmotionPanel = toggleEmotionPanel;
window.loadEmotionPanel   = loadEmotionPanel;
window.endSession      = endSession;
window.openProfile     = openProfile;
window.saveProfile     = saveProfile;
window.closeModal      = closeModal;
window.deleteConversation = deleteConversation;

</script>
</body>
